name: Daily AI News with Word Report

on:
  schedule:
    - cron: '0 0 * * *'  # UTC 时间0:00 = 北京时间 8:00
  workflow_dispatch:  # 允许手动触发

jobs:
  run-news-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests python-dateutil beautifulsoup4 lxml
          pip install python-docx wordcloud matplotlib Pillow
      
      - name: Run AI News Bot
        run: python main.py
      
      - name: Upload Word Report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AI_深度分析报告-${{ github.event.head_commit.id }}
          path: AI_深度分析报告.docx
          retention-days: 30
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.event.head_commit.id }}
          path: logs/
          retention-days: 7
