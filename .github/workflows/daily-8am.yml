name: Daily AI News - 8:00 AM

# 触发条件：每天北京时间上午 8:00（UTC 时间 0:00）
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  run-news-bot:
    runs-on: ubuntu-latest
    
    steps:
      # 第一步：获取代码
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 第二步：设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      # 第三步：安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests python-dateutil beautifulsoup4 lxml
      
      # 第四步：运行 AI 资讯机器人
      - name: Run AI News Bot
        run: python main.py
